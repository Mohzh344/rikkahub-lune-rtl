name: Build Release APK (Master)

on:
  push:
    branches: [ master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Patch Version and Build Config
        run: |
          # Set version for Master RTL build
          sed -i 's/versionCode = 147/versionCode = 1000/' app/build.gradle.kts
          sed -i 's/versionName = "1.0.0-pre.1"/versionName = "1.0.0-rtl"/' app/build.gradle.kts
          
          # Force debug signing
          sed -i 's/signingConfig = signingConfigs.getByName("release")/signingConfig = signingConfigs.getByName("debug")/' app/build.gradle.kts

      - name: set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Create dummy google-services.json
        run: |
          cat > app/google-services.json << 'JSON'
          {
            "project_info": {
              "project_number": "123456789000",
              "firebase_url": "https://dummy-project-default-rtdb.firebaseio.com",
              "project_id": "dummy-project-12345",
              "storage_bucket": "dummy-project-12345.appspot.com"
            },
            "client": [{
              "client_info": {
                "mobilesdk_app_id": "1:123456789000:android:abcdef1234567890",
                "android_client_info": { "package_name": "me.rerere.rikkahub.ywxk" }
              },
              "oauth_client": [],
              "api_key": [{ "current_key": "AIzaSyDummy_Key_For_CI_Build_Only" }],
              "services": {
                "appinvite_service": { "other_platform_oauth_client": [] }
              }
            }],
            "configuration_version": "1"
          }
          JSON

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build Release APK
        run: ./gradlew assembleRelease

      - name: Sign and Align APK
        run: |
          wget -q https://github.com/patrickfav/uber-apk-signer/releases/download/v1.3.0/uber-apk-signer-1.3.0.jar
          java -jar uber-apk-signer-1.3.0.jar -a app/build/outputs/apk/release/ --allowResign

      - name: Upload Release APK
        uses: actions/upload-artifact@v4
        with:
          name: RikkaHub-Master-RTL-Arabic
          path: app/build/outputs/apk/release/*-aligned-debugSigned.apk
